name: unipds-movies

services:
  postgres:
    image: postgres:16-alpine
    container_name: movies-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movies}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movies}
      POSTGRES_DB: ${POSTGRES_DB:-movies}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movies} -d ${POSTGRES_DB:-movies}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - movies-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: movies-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    networks:
      - movies-net

  backend:
    build: ./backend
    container_name: movies-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://movies:movies@postgres:5432/movies}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:3001}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - movies-net

  ml-service:
    build: ./ml-service
    container_name: movies-ml
    restart: unless-stopped
    environment:
      DATABASE_URL: ${ML_DATABASE_URL:-postgres://movies:movies@postgres:5432/movies}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    ports:
      - "3011:3001"   # host 3011 (3001 ocupada) → container 3001
    volumes:
      - mlmodels:/app/models   # modelo treinado (Sprint 4) persiste entre rebuilds
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - movies-net

  frontend:
    build: ./frontend
    container_name: movies-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - movies-net

volumes:
  pgdata:
  qdrantdata:
  mlmodels:

networks:
  movies-net:
    driver: bridge
